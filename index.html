// ---- Cleaning helpers ----
const CITY_MAP = {
  "mumbai": "Mumbai", "pune": "Pune", "bangalore": "Bangalore",
  "navi mumbai": "Navi Mumbai", "thane": "Thane", "kolkata": "Kolkata",
  "hyderabad": "Hyderabad", "jaipur": "Jaipur", "surat": "Surat",
  "nagpur": "Nagpur", "ahmedabad": "Ahmedabad"
};
const COURSE_MAP = {
  "Advanced Trainer Course - module 3": "Advanced Trainer Course",
  "Advanced Canine Behaviour Course": "Behaviour Course",
  "Kennelling and Pet Sitting Course": "Kennelling & Pet Sitting",
  "Therapy Dog Course": "Therapy Dog Course",
  "Aggression Course": "Aggression Course",
  "Basic Trainer Course": "Basic Trainer Course"
};
const VALID_COURSES = new Set([
  "Basic Trainer Course", "Advanced Trainer Course", "Behaviour Course",
  "Therapy Dog Course", "Aggression Course", "Kennelling & Pet Sitting"
]);

function cleanCity(c) {
  const t = (c || "").trim();
  return CITY_MAP[t.toLowerCase()] || t;
}
function cleanPhone(p) {
  // strip any trailing ".0" floats and non-digits
  return String(p).replace(/\.0+$/, "").replace(/[^\d]/g, "");
}
function normCourse(c) {
  const t = (c || "").trim();
  if (/john rogerson/i.test(t) || /workshop/i.test(t)) return null; // external — ignore
  if (COURSE_MAP[t]) return COURSE_MAP[t];
  return VALID_COURSES.has(t) ? t : null;
}
function cleanCourses(arr) {
  const out = [];
  (arr || []).forEach(c => {
    const n = normCourse(c);
    if (n && !out.includes(n)) out.push(n);
  });
  return out;
}
function parseWeb(raw) {
  let v = (raw || "").trim();
  if (!v) return { website: "", instagram: "" };
  // markdown link [text](url) -> use url
  const md = v.match(/\]\((https?:\/\/[^)]+)\)/);
  if (md) v = md[1];
  if (v.startsWith("@") || /instagram\.com/i.test(v)) {
    let url = v;
    if (v.startsWith("@")) url = "https://instagram.com/" + v.slice(1);
    else if (!/^https?:\/\//i.test(v)) url = "https://" + v;
    return { website: "", instagram: url };
  }
  if (!/^https?:\/\//i.test(v)) v = "https://" + v;
  return { website: v, instagram: "" };
}

// ---- Build cleaned dataset (dedup by email) ----
function mergeField(a, b) {
  // keep the more complete (longer / non-empty) value
  if (Array.isArray(a)) return (b && b.length > a.length) ? b : a;
  return (b && String(b).length > String(a || "").length) ? b : a;
}
const byEmail = new Map();
RAW.forEach(r => {
  const web = parseWeb(r.website);
  const entry = {
    name: (r.name || "").trim().replace(/\s+/g, " "),
    phone: cleanPhone(r.phone),
    email: (r.email || "").trim(),
    city: cleanCity(r.city),
    areas: (r.areas || "").trim(),
    courses: cleanCourses(r.courses),
    services: (r.services || []).map(s => s.trim()).filter(Boolean),
    website: web.website,
    instagram: web.instagram
  };
  const key = entry.email.toLowerCase();
  if (byEmail.has(key)) {
    const ex = byEmail.get(key);
    ex.name = mergeField(ex.name, entry.name);
    ex.phone = mergeField(ex.phone, entry.phone);
    ex.city = mergeField(ex.city, entry.city);
    ex.areas = mergeField(ex.areas, entry.areas);
    ex.courses = mergeField(ex.courses, entry.courses);
    ex.services = mergeField(ex.services, entry.services);
    ex.website = mergeField(ex.website, entry.website);
    ex.instagram = mergeField(ex.instagram, entry.instagram);
  } else {
    byEmail.set(key, entry);
  }
});
const TRAINERS = Array.from(byEmail.values());

// ---- Filter options ----
const cities = Array.from(new Set(TRAINERS.map(t => t.city))).sort();
const serviceSet = new Set();
TRAINERS.forEach(t => {

  t.services.forEach(s => serviceSet.add(s));
});
const allServices = Array.from(serviceSet).sort();

const serviceFilter = document.getElementById("serviceFilter");

serviceFilter.innerHTML = '<option value="">All services</option>' +

const esc = s => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

const listEl = document.getElementById("list");

function render() {
  const city = cityFilter.value;
  const service = serviceFilter.value;
  const matches = TRAINERS.filter(t => {
    const cityOk = !city || t.city === city;
    const svcOk = !service || t.courses.includes(service) || t.services.includes(service);
    return cityOk && svcOk;
  });

  if (matches.length === 0) {
    countEl.textContent = "";
    listEl.innerHTML = '<div class="empty">No trainers found — try a different filter</div>';
    return;
  }

  countEl.textContent = "Showing " + matches.length + " trainer" + (matches.length === 1 ? "" : "s");

  listEl.innerHTML = matches.map(t => {
    const courseChips = t.courses.map(c => `<span class="chip course">${esc(c)}</span>`).join("");
    const serviceChips = t.services.map(s => `<span class="chip service">${esc(s)}</span>`).join("");
    const tags = (courseChips || serviceChips)
      ? `<div class="tags">${courseChips}${serviceChips}</div>` : "";
    const areas = t.areas
      ? `<div class="areas">${esc(t.areas)}</div>` : "";

    const contactItems = [];
    if (t.phone) contactItems.push(`<span class="item">${ICON.phone}${esc(t.phone)}</span>`);
    if (t.email) contactItems.push(`<span class="item">${ICON.mail}${esc(t.email)}</span>`);
    if (t.instagram) contactItems.push(`<span class="item">${ICON.instagram}<a href="${esc(t.instagram)}" target="_blank" rel="noopener">${esc(t.instagram.replace(/^https?:\/\//,''))}</a></span>`);
    else if (t.website) contactItems.push(`<span class="item">${ICON.globe}<a href="${esc(t.website)}" target="_blank" rel="noopener">${esc(t.website.replace(/^https?:\/\//,''))}</a></span>`);

    return `<div class="card">
      <div class="name">${esc(t.name)}</div>
      <div class="city">${esc(t.city)}</div>
      ${areas}
      ${tags}
      <hr class="divider" />
      <div class="contact">${contactItems.join("")}</div>
    </div>`;
  }).join("");
}

cityFilter.addEventListener("change", render);
serviceFilter.addEventListener("change", render);
render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
